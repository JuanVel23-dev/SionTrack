<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Chart.js - SionTrack</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: system-ui; padding: 40px; }
        .test-box { background: #222; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .test-box h3 { margin: 0 0 16px; color: #d4af37; }
        canvas { max-height: 300px; }
        #log { background: #111; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 12px; white-space: pre-wrap; color: #10b981; max-height: 300px; overflow-y: auto; }
        .error { color: #f43f5e; }
        .info { color: #60a5fa; }
    </style>
</head>
<body>
    <h1>Diagnóstico Chart.js — SionTrack</h1>
    
    <div class="test-box">
        <h3>1. Verificación de Chart.js</h3>
        <div id="check"></div>
    </div>

    <div class="test-box">
        <h3>2. Gráfica de barras</h3>
        <canvas id="testBar"></canvas>
    </div>

    <div class="test-box">
        <h3>3. Gráfica de dona</h3>
        <canvas id="testDoughnut"></canvas>
    </div>

    <div class="test-box">
        <h3>4. Gráfica polar</h3>
        <canvas id="testPolar"></canvas>
    </div>

    <div class="test-box">
        <h3>5. Log de consola</h3>
        <div id="log"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script>
        const logEl = document.getElementById('log');
        const checkEl = document.getElementById('check');

        function log(msg, type = '') {
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(line);
            console.log(msg);
        }

        // 1. Check Chart.js
        try {
            log(`typeof Chart = ${typeof Chart}`, 'info');
            log(`Chart.version = ${Chart?.version}`, 'info');
            log(`Chart.register = ${typeof Chart?.register}`, 'info');
            log(`Chart.defaults = ${typeof Chart?.defaults}`, 'info');
            
            if (typeof Chart !== 'undefined') {
                checkEl.innerHTML = `<span style="color:#10b981">✓ Chart.js v${Chart.version} cargado correctamente</span>`;
            } else {
                checkEl.innerHTML = `<span style="color:#f43f5e">✗ Chart.js NO disponible</span>`;
            }
        } catch(e) {
            log(`Error verificando Chart.js: ${e.message}`, 'error');
        }

        // 2. Test Bar Chart
        try {
            log('Creando gráfica de barras...', 'info');
            const ctx1 = document.getElementById('testBar').getContext('2d');
            new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: ['Filtro aceite', 'Aceite 5W-30', 'Bujía iridio', 'Pastillas freno', 'Correa dist.'],
                    datasets: [{
                        label: 'Vendidos',
                        data: [10, 7, 12, 5, 1],
                        backgroundColor: [
                            'rgba(212,175,55,0.8)',
                            'rgba(59,130,246,0.8)',
                            'rgba(16,185,129,0.8)',
                            'rgba(244,63,94,0.8)',
                            'rgba(168,85,247,0.8)'
                        ],
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.08)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
            log('✓ Barras creada OK', 'info');
        } catch(e) {
            log(`✗ Error barras: ${e.message}`, 'error');
            log(`  Stack: ${e.stack}`, 'error');
        }

        // 3. Test Doughnut
        try {
            log('Creando gráfica dona...', 'info');
            const ctx2 = document.getElementById('testDoughnut').getContext('2d');
            new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['Filtro', 'Aceite', 'Bujía', 'Pastillas', 'Correa'],
                    datasets: [{
                        data: [10, 7, 12, 5, 1],
                        backgroundColor: [
                            'rgba(212,175,55,0.8)',
                            'rgba(59,130,246,0.8)',
                            'rgba(16,185,129,0.8)',
                            'rgba(244,63,94,0.8)',
                            'rgba(168,85,247,0.8)'
                        ]
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
            log('✓ Dona creada OK', 'info');
        } catch(e) {
            log(`✗ Error dona: ${e.message}`, 'error');
            log(`  Stack: ${e.stack}`, 'error');
        }

        // 4. Test Polar
        try {
            log('Creando gráfica polar...', 'info');
            const ctx3 = document.getElementById('testPolar').getContext('2d');
            new Chart(ctx3, {
                type: 'polarArea',
                data: {
                    labels: ['Filtro', 'Aceite', 'Bujía', 'Pastillas', 'Correa'],
                    datasets: [{
                        data: [10, 7, 12, 5, 1],
                        backgroundColor: [
                            'rgba(212,175,55,0.6)',
                            'rgba(59,130,246,0.6)',
                            'rgba(16,185,129,0.6)',
                            'rgba(244,63,94,0.6)',
                            'rgba(168,85,247,0.6)'
                        ]
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
            log('✓ Polar creada OK', 'info');
        } catch(e) {
            log(`✗ Error polar: ${e.message}`, 'error');
            log(`  Stack: ${e.stack}`, 'error');
        }

        log('=== Diagnóstico completado ===', 'info');
    </script>
</body>
</html>
