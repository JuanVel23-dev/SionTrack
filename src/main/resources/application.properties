spring.application.name=siontrack
server.port=8081

# Base de Datos
spring.datasource.url=jdbc:postgresql://localhost:5432/SionTrackDB?currentSchema=siontrack
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=validate

# Seguridad (será ignorado por SecurityConfig, pero lo dejamos por claridad)
spring.security.user.name=admin
spring.security.user.password=admin123

spring.jmx.enabled=true

# Thymeleaf (¡Esta es la única línea que realmente necesitamos para desarrollo!)
# Deshabilita la caché de Thymeleaf para ver los cambios de HTML al instante.
spring.thymeleaf.cache=false

# NO NECESITAMOS DEFINIR spring.web.resources.static-locations
# Spring Boot lo hace automáticamente por nosotros.