<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<th:block layout:fragment="content">

    <div class="table-toolbar">
        <div class="table-toolbar-left">
            <div class="table-search">
                <i class="fas fa-search table-search-icon"></i>
                <input type="text"
                       id="searchInput"
                       placeholder="Buscar proveedores..."
                       aria-label="Buscar proveedores">
            </div>
            </div>

        <div class="table-toolbar-right">
            <a th:href="@{/web/proveedores/nuevo}" class="btn btn-primary">
                <i class="fas fa-plus"></i>
                <span>Nuevo Proveedor</span>
            </a>
        </div>
    </div>

    <div class="table-wrapper">
        <table class="table table-striped table-mobile">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Contacto</th>
                    <th style="text-align: right;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="prov : ${proveedores}">
                    <td th:text="${prov.proveedor_id}" data-label="ID">...</td>
                    <td th:text="${prov.nombre}" data-label="Nombre">...</td>
                    <td th:text="${prov.telefono}" data-label="Teléfono">...</td>
                    <td th:text="${prov.email}" data-label="Email">...</td>
                    <td th:text="${prov.nombre_contacto}" data-label="Contacto">...</td>
                    <td data-label="Acciones">
                        <div class="table-actions">
                            <a th:href="@{/web/proveedores/editar/{id}(id=${prov.proveedor_id})}"
                               class="table-action-btn btn-edit"
                               title="Editar">
                                <i class="fas fa-edit"></i>
                                <span>Editar</span>
                            </a>
                            
                            <a th:href="@{/web/proveedores/eliminar/{id}(id=${prov.proveedor_id})}"
                               class="table-action-btn btn-delete"
                               data-confirm="¿Estás seguro de eliminar este proveedor? Esta acción no se puede deshacer."
                               title="Eliminar">
                                <i class="fas fa-trash"></i>
                                <span>Eliminar</span>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${proveedores == null OR proveedores.isEmpty()}" class="table-empty">
            <div class="empty-state">
                <div class="empty-state-icon">
                    <i class="fas fa-truck"></i>
                </div>
                <h3 class="empty-state-title">No hay proveedores registrados</h3>
                <p class="empty-state-description">
                    Comienza agregando tu primer proveedor al sistema.
                </p>
                <a th:href="@{/web/proveedores/nuevo}" class="btn btn-primary">
                    <i class="fas fa-plus"></i>
                    Crear Primer Proveedor
                </a>
            </div>
        </div>
    </div>
    
    </th:block>

<th:block layout:fragment="customJS">
    <script th:inline="javascript">
    // Script de búsqueda simple (idéntico al de clientes-lista.js)
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('searchInput');
        const tableRows = document.querySelectorAll('tbody tr');

        if (searchInput) {
            searchInput.addEventListener('input', () => {
                const searchTerm = searchInput.value.toLowerCase();
                tableRows.forEach(row => {
                    // Busca en las columnas 1 (Nombre) y 3 (Email)
                    const nombre = row.children[1]?.textContent.toLowerCase() || '';
                    const email = row.children[3]?.textContent.toLowerCase() || '';
                    
                    const matchesSearch = nombre.includes(searchTerm) || email.includes(searchTerm);
                    row.style.display = matchesSearch ? '' : 'none';
                });
            });
        }
    });
    </script>
</th:block>
</html>
