<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Proveedores</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn { padding: 5px 10px; text-decoration: none; border-radius: 4px; margin: 2px; display: inline-block; }
        .btn-crear { background-color: #007bff; color: white; margin-bottom: 15px; }
        .btn-editar { background-color: #ffc107; color: black; }
        .btn-eliminar { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>Gestión de Proveedores</h1>

    <a th:href="@{/web/proveedores/nuevo}" class="btn btn-crear">
        Crear Nuevo Proveedor
    </a>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="prov : ${proveedores}">
                <td th:text="${prov.proveedor_id}">...</td>
                <td th:text="${prov.nombre}">...</td>
                <td th:text="${prov.telefono}">...</td>
                <td th:text="${prov.email}">...</td>
                <td>
                    <a th:href="@{/web/proveedores/editar/{id}(id=${prov.proveedor_id})}" 
                       class="btn btn-editar">Actualizar</a>
                    
                    <a th:href="@{/web/proveedores/eliminar/{id}(id=${prov.proveedor_id})}" 
                       class="btn btn-eliminar"
                       onclick="return confirm('¿Estás seguro?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
