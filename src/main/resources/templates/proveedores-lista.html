<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<th:block layout:fragment="content">
    <!-- Page Header -->
    <div class="page-header animate-in">
        <div class="page-header-content">
            <h1 class="page-header-title">Proveedores</h1>
            <p class="page-header-description">Gestiona tus proveedores y contactos</p>
        </div>
        <a th:href="@{/web/proveedores/nuevo}" class="btn btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span>Nuevo Proveedor</span>
        </a>
    </div>

    <!-- Table Container -->
    <div class="table-container animate-in delay-1">
        <div class="table-toolbar">
            <div class="table-toolbar-left">
                <div class="table-search">
                    <svg class="table-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text"
                           id="searchInput"
                           placeholder="Buscar proveedores..."
                           aria-label="Buscar proveedores">
                </div>
            </div>
        </div>

        <table class="table" th:if="${proveedores != null and not proveedores.empty}">
            <thead>
                <tr>
                    <th class="text-left" data-sort="number">ID</th>
                    <th class="text-left" data-sort="text">Nombre</th>
                    <th class="text-left" data-sort="text">Telefono</th>
                    <th class="text-left" data-sort="text">Email</th>
                    <th class="text-left" data-sort="text">Contacto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="prov : ${proveedores}" class="data-row">
                    <td th:text="${prov.proveedor_id}" data-label="ID" class="text-left">1</td>
                    <td th:text="${prov.nombre}" data-label="Nombre" class="text-left">Proveedor</td>
                    <td data-label="Telefono" class="text-left">
                        <div class="contact-info-item" th:if="${prov.telefono != null and not prov.telefono.empty}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                            </svg>
                            <span th:text="${prov.telefono}">022123456</span>
                        </div>
                        <span th:if="${prov.telefono == null or prov.telefono.empty}" class="text-subtle">-</span>
                    </td>
                    <td data-label="Email" class="text-left">
                        <div class="contact-info-item" th:if="${prov.email != null and not prov.email.empty}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                <polyline points="22,6 12,13 2,6"></polyline>
                            </svg>
                            <span th:text="${prov.email}">email@proveedor.com</span>
                        </div>
                        <span th:if="${prov.email == null or prov.email.empty}" class="text-subtle">-</span>
                    </td>
                    <td data-label="Contacto" class="text-left">
                        <div class="contact-info-item" th:if="${prov.nombre_contacto != null and not prov.nombre_contacto.empty}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <span th:text="${prov.nombre_contacto}">Nombre Contacto</span>
                        </div>
                        <span th:if="${prov.nombre_contacto == null or prov.nombre_contacto.empty}" class="text-subtle">-</span>
                    </td>
                    <td data-label="Acciones">
                        <div class="table-actions">
                            <a th:href="@{/web/proveedores/editar/{id}(id=${prov.proveedor_id})}"
                               class="table-action-btn btn-edit"
                               title="Editar proveedor">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </a>
                            <form th:action="@{/web/proveedores/eliminar/{id}(id=${prov.proveedor_id})}" method="post" style="display:inline;">
                                <button type="submit"
                                   class="table-action-btn btn-delete"
                                   title="Eliminar proveedor">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="3 6 5 6 21 6"></polyline>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                        <line x1="10" y1="11" x2="10" y2="17"></line>
                                        <line x1="14" y1="11" x2="14" y2="17"></line>
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Paginación -->
        <div th:if="${page != null}" th:replace="~{fragments/paginacion :: paginacion(${page}, '/web/proveedores', 'page', null)}"></div>

        <!-- Empty State -->
        <div th:if="${proveedores == null or proveedores.empty}" class="table-empty">
            <div class="empty-state">
                <div class="empty-state-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="1" y="3" width="15" height="13"></rect>
                        <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                        <circle cx="5.5" cy="18.5" r="2.5"></circle>
                        <circle cx="18.5" cy="18.5" r="2.5"></circle>
                    </svg>
                </div>
                <h3 class="empty-state-title">No hay proveedores registrados</h3>
                <p class="empty-state-description">
                    Comienza agregando tu primer proveedor al sistema
                </p>
                <a th:href="@{/web/proveedores/nuevo}" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Crear Primer Proveedor</span>
                </a>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="customJS">
    <script th:src="@{/js/filtro-tabla.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            SionFiltroTabla.init({
                searchInput: '#searchInput',
                rows: '.table tbody tr.data-row',
                searchColumns: [0, 1, 2, 3, 4]
            });

            // Formatear teléfonos visibles
            SionUtils.formatearTelefonosVisibles('.contact-info-item span');
        });
    </script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        (function() {
            var successMessage = /*[[${successMessage}]]*/ null;
            var deleteMessage = /*[[${deleteMessage}]]*/ null;
            
            if (successMessage && typeof showToast === 'function') {
                showToast(successMessage, 'success');
            }
            
            if (deleteMessage && typeof showToast === 'function') {
                showToast(deleteMessage, 'error');
            }
        })();
        /*]]>*/
    </script>
</th:block>

</html>
