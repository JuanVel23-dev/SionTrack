<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<th:block layout:fragment="content">
    <div class="card animate-in">
        <div class="card-header">
            <h2 class="card-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line>
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                <span th:if="${productoId == null}">Nuevo Producto</span>
                <span th:if="${productoId != null}">Editar Producto</span>
            </h2>
        </div>

        <form th:object="${producto}"
              th:action="@{/web/productos/guardar}"
              method="post"
              id="productoForm">

            <input type="hidden" name="productoId" th:value="${productoId}" />

            <div class="card-body">
                <!-- Datos del Producto -->
                <h3 class="form-section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    </svg>
                    Datos del Producto
                </h3>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="nombre" class="form-label required">Nombre</label>
                        <input type="text"
                               id="nombre"
                               th:field="*{nombre}"
                               class="form-input"
                               th:errorclass="'error'"
                               required
                               maxlength="100"
                               placeholder="Ej: Aceite 5W-30">
                        <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="form-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="codigo_producto" class="form-label">Código del Producto</label>
                        <input type="text"
                               id="codigo_producto"
                               th:field="*{codigo_producto}"
                               class="form-input"
                               maxlength="50"
                               placeholder="Ej: ACE-5W30-001">
                        <span class="form-help">Código interno o de proveedor para identificar el producto.</span>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="categoria" class="form-label">Categoría</label>
                        <input type="text"
                               id="categoria"
                               th:field="*{categoria}"
                               class="form-input"
                               maxlength="50"
                               placeholder="Ej: Lubricantes">
                    </div>
                    <div class="form-group">
                        <label for="proveedor_id" class="form-label">Proveedor</label>
                        <select id="proveedor_id"
                                th:field="*{proveedor_id}"
                                class="form-select"
                                data-searchable>
                            <option value="">Seleccione un proveedor</option>
                            <option th:each="prov : ${listaProveedores}"
                                    th:value="${prov.proveedor_id}"
                                    th:text="${prov.nombre}">
                                Proveedor
                            </option>
                        </select>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Precios -->
                <h3 class="form-section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                    Precios
                </h3>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="precio_compra" class="form-label">Precio de Compra</label>
                        <input type="number"
                               id="precio_compra"
                               th:field="*{precio_compra}"
                               class="form-input"
                               th:errorclass="'error'"
                               step="0.01"
                               min="0.01"
                               required
                               placeholder="1.00">
                        <span th:if="${#fields.hasErrors('precio_compra')}" th:errors="*{precio_compra}" class="form-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="precio_venta" class="form-label required">Precio de Venta</label>
                        <input type="number"
                               id="precio_venta"
                               th:field="*{precio_venta}"
                               class="form-input"
                               th:errorclass="'error'"
                               step="0.01"
                               min="0.01"
                               required
                               placeholder="1.00">
                        <span th:if="${#fields.hasErrors('precio_venta')}" th:errors="*{precio_venta}" class="form-error"></span>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="fecha_compra" class="form-label">Fecha de Compra</label>
                        <div class="sion-datepicker" id="datepicker_fecha_compra">
                            <button type="button" class="sion-datepicker-btn">
                                <svg class="sion-datepicker-icono" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                <span class="sion-datepicker-texto placeholder">Selecciona una fecha</span>
                                <svg class="sion-datepicker-flecha" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </button>
                            <input type="date"
                                   id="fecha_compra"
                                   th:field="*{fecha_compra}"
                                   class="sion-datepicker-hidden">
                        </div>
                        <span class="form-help">Fecha en la que fue adquirido el producto.</span>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Inventario -->
                <h3 class="form-section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3h18v18H3z"></path>
                        <path d="M21 9H3"></path>
                        <path d="M21 15H3"></path>
                        <path d="M9 21V3"></path>
                        <path d="M15 21V3"></path>
                    </svg>
                    Inventario
                </h3>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="cantidad_disponible" class="form-label required">Cantidad Disponible</label>
                        <input type="number"
                               id="cantidad_disponible"
                               th:field="*{cantidad_disponible}"
                               class="form-input"
                               th:errorclass="'error'"
                               min="1"
                               required
                               placeholder="1">
                        <span th:if="${#fields.hasErrors('cantidad_disponible')}" th:errors="*{cantidad_disponible}" class="form-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="stock_minimo" class="form-label required">Stock Mínimo</label>
                        <input type="number"
                               id="stock_minimo"
                               th:field="*{stock_minimo}"
                               class="form-input"
                               th:errorclass="'error'"
                               min="1"
                               required
                               placeholder="10">
                        <span th:if="${#fields.hasErrors('stock_minimo')}" th:errors="*{stock_minimo}" class="form-error"></span>
                        <span class="form-help">Se mostrará alerta cuando el stock sea menor a este valor.</span>
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <a th:href="@{/web/productos}" class="btn btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                    <span>Cancelar</span>
                </a>
                <button type="submit" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    <span th:if="${productoId == null}">Crear Producto</span>
                    <span th:if="${productoId != null}">Guardar Cambios</span>
                </button>
            </div>
        </form>
    </div>
</th:block>

</html>
