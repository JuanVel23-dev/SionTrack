<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<th:block layout:fragment="content">
    
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">
                <span th:if="${productoId == null}">Nuevo Producto</span>
                <span th:if="${productoId != null}">Editar Producto</span>
            </h2>
        </div>

        <form th:object="${producto}"
              th:action="@{/web/productos/guardar}"
              method="post"
              data-validate>

            <input type="hidden" name="productoId" th:value="${productoId}" />

            <div class="card-body">
                <h3 class="form-section-title">
                    <i class="fas fa-box"></i> Datos del Producto
                </h3>

                <div class="form-grid" style="grid-template-columns: 2fr 1fr 1fr;">
                    <div class="form-group">
                        <label for="nombre" class="form-label required">Nombre</label>
                        <input type="text" id="nombre" th:field="*{nombre}" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="marca" class="form-label">Marca</label>
                        <input type="text" id="marca" th:field="*{marca}" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="categoria" class="form-label">Categoría</label>
                        <input type="text" id="categoria" th:field="*{categoria}" class="form-input">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="proveedor_id" class="form-label">Proveedor</label>
                        <select id="proveedor_id" th:field="*{proveedor_id}" class="form-select">
                            <option value="">-- Seleccione un Proveedor --</option>
                            <option th:each="prov : ${listaProveedores}"
                                    th:value="${prov.proveedor_id}"
                                    th:text="${prov.nombre}">
                                Proveedor 1
                            </option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="unidad_medida" class="form-label">Unidad de Medida</label>
                        <input type="text" id="unidad_medida" th:field="*{unidad_medida}" class="form-input" placeholder="Ej: Unidad, Litro, Kg">
                    </div>
                    
                    <div class="form-group">
                        <label for="estado" class="form-label required">Estado</label>
                        <input type="text" id="estado" th:field="*{estado}" class="form-input" required>
                        <span class="form-help">Ej: Activo, Inactivo</span>
                    </div>
                </div>

                <div class="divider"></div>

                <h3 class="form-section-title">
                    <i class="fas fa-warehouse"></i> Costos e Inventario
                </h3>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="precio_compra" class="form-label">Precio Compra</label>
                        <input type="number" step="0.01" id="precio_compra" th:field="*{precio_compra}" class="form-input" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="precio_venta" class="form-label required">Precio Venta</label>
                        <input type="number" step="0.01" id="precio_venta" th:field="*{precio_venta}" class="form-input" required placeholder="0.00">
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="cantidad_disponible" class="form-label required">Cantidad (Stock)</label>
                        <input type="number" id="cantidad_disponible" th:field="*{cantidad_disponible}" class="form-input" required placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="stock_minimo" class="form-label required">Stock Mínimo</label>
                        <input type="number" id="stock_minimo" th:field="*{stock_minimo}" class="form-input" required placeholder="0">
                        <span class="form-help">Nivel para alertas de inventario.</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="ubicacion" class="form-label">Ubicación en Bodega</label>
                    <input type="text" id="ubicacion" th:field="*{ubicacion}" class="form-input" placeholder="Ej: Estante A-1, Percha 3">
                </div>

            </div>

            <div class="card-footer">
                <a th:href="@{/web/productos}" class="btn btn-secondary">
                    <i class="fas fa-times"></i>
                    Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i>
                    <span th:if="${productoId == null}">Crear Producto</span>
                    <span th:if="${productoId != null}">Guardar Cambios</span>
                </button>
            </div>
        </form>
    </div>
    
    <th:block layout:fragment="customCSS">
        <style>
            .form-section-title {
                color: var(--accent-primary);
                margin-bottom: var(--spacing-lg);
                border-bottom: 1px solid var(--border-color);
                padding-bottom: var(--spacing-sm);
                font-size: 1.15rem;
            }
            .form-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: var(--spacing-lg);
            }
        </style>
    </th:block>
    
</th:block>
</html>
