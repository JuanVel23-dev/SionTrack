<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Producto</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 600px; }
        form div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], select { 
            width: 100%; padding: 8px; box-sizing: border-box; 
        }
        .btn-guardar { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancelar { background-color: #6c757d; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <form th:object="${producto}" th:action="@{/web/productos/guardar}" method="post">
        
        <input type="hidden" th:field="*{producto_id}" />
        <input type="hidden" th:field="*{inventario.inventario_id}" />

        <h3>Datos del Producto</h3>
        
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" th:field="*{nombre}" required />
        </div>
        
        <div>
            <label for="categoria">Categoría:</label>
            <input type="text" id="categoria" th:field="*{categoria}" />
        </div>

        <div>
            <label for="marca">Marca:</label>
            <input type="text" id="marca" th:field="*{marca}" />
        </div>

        <div>
            <label for="precio_venta">Precio Venta:</label>
            <input type="number" step="0.01" id="precio_venta" th:field="*{precio_venta}" required />
        </div>

        <div>
            <label for="estado">Estado:</label>
            <input type="text" id="estado" th:field="*{estado}" required />
        </div>

        <div>
            <label for="proveedor">Proveedor:</label>
            <select id="proveedor" th:field="*{proveedor}">
                <option value="">-- Seleccione un Proveedor --</option>
                <option th:each="prov : ${listaProveedores}"
                        th:value="${prov.proveedor_id}"
                        th:text="${prov.nombre}">
                </option>
            </select>
        </div>

        <hr>
        <h3>Datos de Inventario</h3>

        <div>
            <label for="cantidad_disponible">Cantidad Disponible:</label>
            <input type="number" id="cantidad_disponible" th:field="*{inventario.cantidad_disponible}" required />
        </div>
        
        <div>
            <label for="stock_minimo">Stock Mínimo:</label>
            <input type="number" id="stock_minimo" th:field="*{inventario.stock_minimo}" required />
        </div>

        <div>
            <label for="ubicacion">Ubicación:</label>
            <input type="text" id="ubicacion" th:field="*{inventario.ubicacion}" />
        </div>
<div>
            <label for="unidad_medida">Unidad de Medida:</label>
            <input type="text" id="unidad_medida" th:field="*{unidad_medida}" />
        </div>
        
        <div>
            <label for="precio_compra">Precio Compra:</label>
            <input type="number" step="0.01" id="precio_compra" th:field="*{precio_compra}" />
        </div>

        <div>
            <label for="precio_venta">Precio Venta:</label>
            </div>

        <div>
            <button type="submit" class="btn-guardar">Guardar</button>
            <a th:href="@{/web/productos}" class="btn-cancelar">Cancelar</a>
        </div>
    </form>
</body>
</html>
