<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<th:block layout:fragment="content">
    
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">
                <span th:if="${proveedorId == null}">Nuevo Proveedor</span>
                <span th:if="${proveedorId != null}">Editar Proveedor</span>
            </h2>
        </div>

        <form th:object="${proveedor}"
              th:action="@{/web/proveedores/guardar}"
              method="post"
              data-validate> <input type="hidden" name="proveedorId" th:value="${proveedorId}" />

            <div class="card-body">
                <h3 class="form-section-title">
                    <i class="fas fa-truck"></i> Información del Proveedor
                </h3>

                <div class="form-group">
                    <label for="nombre" class="form-label required">Nombre</label>
                    <input type="text"
                           id="nombre"
                           th:field="*{nombre}"
                           class="form-input"
                           required
                           placeholder="Ej: Proveedor S.A."
                           aria-label="Nombre del proveedor">
                    <span class="form-help">Nombre legal o comercial del proveedor.</span>
                </div>

                <div class="form-grid">
                    
                    <div class="form-group">
                        <label for="telefono" class="form-label">Teléfono</label>
                        <input type="tel"
                               id="telefono"
                               th:field="*{telefono}"
                               class="form-input"
                               placeholder="Ej: 022123456"
                               aria-label="Teléfono">
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email"
                               id="email"
                               th:field="*{email}"
                               class="form-input"
                               placeholder="Ej: contacto@proveedor.com"
                               aria-label="Email">
                    </div>
                </div>

                <div class="divider"></div>

                <h3 class="form-section-title">
                    <i class="fas fa-user-tie"></i> Contacto Adicional
                </h3>

                <div class="form-group">
                    <label for="direccion" class="form-label">Dirección</label>
                    <input type="text"
                           id="direccion"
                           th:field="*{direccion}"
                           class="form-input"
                           placeholder="Ej: Av. Principal 123, Quito"
                           aria-label="Dirección">
                </div>

                <div class="form-group">
                    <label for="nombre_contacto" class="form-label">Nombre de Contacto</label>
                    <input type="text"
                           id="nombre_contacto"
                           th:field="*{nombre_contacto}"
                           class="form-input"
                           placeholder="Ej: Ana López"
                           aria-label="Nombre de Contacto">
                    <span class="form-help">Persona de contacto dentro de la empresa proveedora.</span>
                </div>

            </div>

            <div class="card-footer">
                <a th:href="@{/web/proveedores}" class="btn btn-secondary">
                    <i class="fas fa-times"></i>
                    Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i>
                    <span th:if="${proveedorId == null}">Crear Proveedor</span>
                    <span th:if="${proveedorId != null}">Guardar Cambios</span>
                </button>
            </div>
        </form>
    </div>
    
    <th:block layout:fragment="customCSS">
        <style>
            .form-section-title {
                color: var(--accent-primary);
                margin-bottom: var(--spacing-lg);
                border-bottom: 1px solid var(--border-color);
                padding-bottom: var(--spacing-sm);
                font-size: 1.15rem;
            }
            .form-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: var(--spacing-lg);
            }
        </style>
    </th:block>
    
</th:block>
</html>
