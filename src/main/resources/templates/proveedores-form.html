<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Proveedor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 600px; }
        form div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn-guardar { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancelar { background-color: #6c757d; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <form th:object="${proveedor}" th:action="@{/web/proveedores/guardar}" method="post">
        
        <input type="hidden" th:field="*{proveedor_id}" />

        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" th:field="*{nombre}" required />
        </div>
        
        <div>
            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" th:field="*{telefono}" />
        </div>
        
        <div>
            <label for="email">Email:</label>
            <input type="text" id="email" th:field="*{email}" />
        </div>
        
        <div>
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" th:field="*{direccion}" />
        </div>
        
        <div>
            <label for="nombre_contacto">Nombre de Contacto:</label>
            <input type="text" id="nombre_contacto" th:field="*{nombre_contacto}" />
        </div>

        <div>
            <button type="submit" class="btn-guardar">Guardar</button>
            <a th:href="@{/web/proveedores}" class="btn-cancelar">Cancelar</a>
        </div>
    </form>
</body>
</html>
