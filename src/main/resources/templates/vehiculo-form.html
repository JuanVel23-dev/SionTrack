<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<th:block layout:fragment="content">
    <div class="card animate-in">
        <div class="card-header">
            <h2 class="card-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"></path>
                    <circle cx="6.5" cy="16.5" r="2.5"></circle>
                    <circle cx="16.5" cy="16.5" r="2.5"></circle>
                </svg>
                Nuevo Vehículo
            </h2>
        </div>

        <form th:object="${vehiculo}"
              th:action="@{/web/vehiculos/guardar}"
              method="post"
              data-validate>

            <input type="hidden" name="clienteId" th:value="${clienteId}" />

            <div class="card-body">
                
                <div class="alert alert-info mb-6">
                    <span class="alert-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </span>
                    <div class="alert-content">
                        <div class="alert-title">Cliente</div>
                        <p class="alert-message" th:text="${clienteNombre}">Nombre del cliente</p>
                    </div>
                </div>

                
                <h3 class="form-section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"></path>
                        <circle cx="6.5" cy="16.5" r="2.5"></circle>
                        <circle cx="16.5" cy="16.5" r="2.5"></circle>
                    </svg>
                    Información del Vehículo
                </h3>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="placa" class="form-label required">Placa</label>
                        <input type="text"
                               id="placa"
                               th:field="*{placa}"
                               class="form-input"
                               th:errorclass="'error'"
                               required
                               maxlength="10"
                               placeholder="Ej: ABC-123"
                               autocomplete="off">
                        <span th:if="${#fields.hasErrors('placa')}" th:errors="*{placa}" class="form-error"></span>
                        <span class="form-help-placa">Formato: ABC-123 o ABC-12D</span>
                    </div>
                    <div class="form-group">
                        <label for="kilometraje_actual" class="form-label required">Kilometraje Actual</label>
                        <input type="text"
                               id="kilometraje_actual"
                               th:field="*{kilometraje_actual}"
                               class="form-input"
                               th:errorclass="'error'"
                               required
                               inputmode="numeric"
                               placeholder="Ej: 50000"
                               autocomplete="off">
                        <span th:if="${#fields.hasErrors('kilometraje_actual')}" th:errors="*{kilometraje_actual}" class="form-error"></span>
                        <span class="form-help">Solo números enteros</span>
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <a th:href="@{/web/clientes}" class="btn btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                    Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    Guardar Vehículo
                </button>
            </div>
        </form>
    </div>
</th:block>

<th:block layout:fragment="customJS">
    <script th:src="@{/js/vehiculo-form.js}"></script>
</th:block>

</html>
