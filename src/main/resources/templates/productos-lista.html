<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<th:block layout:fragment="customCSS"></th:block>

<th:block layout:fragment="content">
    <!-- Page Header -->
    <div class="page-header animate-in">
        <div class="page-header-content">
            <h1 class="page-header-title">Productos</h1>
            <p class="page-header-description">Inventario y control de stock</p>
        </div>
        <a th:href="@{/web/productos/nuevo}" class="btn btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span>Nuevo Producto</span>
        </a>
    </div>

    <!-- Table Container -->
    <div class="table-container animate-in delay-1">
        <div class="table-toolbar">
            <div class="table-toolbar-left">
                <div class="table-search">
                    <svg class="table-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text"
                           id="searchInput"
                           placeholder="Buscar por código, nombre, categoría, marca o proveedor..."
                           aria-label="Buscar productos">
                </div>
            </div>
        </div>

        <!-- Filtros rapidos -->
        <div class="filter-chips" id="filterChips">
            <button type="button" class="filter-chip active" data-filter="stock" data-value="">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                Todos
            </button>
            <button type="button" class="filter-chip filter-chip-success" data-filter="stock" data-value="0">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Stock Normal
            </button>
            <button type="button" class="filter-chip filter-chip-danger" data-filter="stock" data-value="1">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                Stock Bajo
            </button>
        </div>

        <table class="table" th:if="${productos != null and not productos.empty}">
            <thead>
                <tr>
                    <th class="text-left" data-sort="text">Código</th>
                    <th class="text-left" data-sort="text">Nombre</th>
                    <th class="text-left" data-sort="text">Categoría</th>
                    <th class="text-left" data-sort="text">Proveedor</th>
                    <th class="text-right" data-sort="currency">Precio Venta</th>
                    <th class="text-center" data-sort="number">Stock</th>
                    <th class="text-center" data-sort="date">Fecha Compra</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="prod : ${productos}"
                    th:data-stock="${prod.alerta_stock ? '1' : '0'}"
                    class="data-row">
                    <td data-label="Código" class="text-left">
                        <span class="producto-codigo" th:text="${prod.codigo_producto != null ? prod.codigo_producto : '—'}">—</span>
                    </td>
                    <td data-label="Nombre" class="text-left">
                        <span th:text="${prod.nombre}">Producto</span>
                    </td>
                    <td th:text="${prod.categoria}" data-label="Categoría" class="text-left">Categoría</td>
                    <td data-label="Proveedor" class="text-left"
                        th:text="${prod.proveedor != null ? prod.proveedor.nombre : '—'}">—</td>
                    <td data-label="Precio" class="text-right">
                        <span th:text="${'$ ' + #numbers.formatDecimal(prod.precio_venta, 1, 2)}">$ 0.00</span>
                    </td>
                    <td data-label="Stock" class="text-center">
                        <span class="stock-badge"
                              th:classappend="${prod.alerta_stock} ? 'stock-badge-danger' : 'stock-badge-ok'"
                              th:text="${prod.cantidad_disponible}">0</span>
                    </td>
                    <td data-label="Fecha Compra" class="text-center"
                        th:text="${prod.fecha_compra != null ? #temporals.format(prod.fecha_compra, 'dd/MM/yyyy') : '—'}">—</td>
                    <td data-label="Acciones">
                        <div class="table-actions">
                            <a th:href="@{/web/productos/editar/{id}(id=${prod.producto_id})}"
                               class="table-action-btn btn-edit"
                               title="Editar producto">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </a>
                            <form th:action="@{/web/productos/eliminar/{id}(id=${prod.producto_id})}" method="post" style="display:inline;">
                                <button type="submit"
                                   class="table-action-btn btn-delete"
                                   title="Eliminar producto">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="3 6 5 6 21 6"></polyline>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                        <line x1="10" y1="11" x2="10" y2="17"></line>
                                        <line x1="14" y1="11" x2="14" y2="17"></line>
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Paginación -->
        <div th:if="${page != null}" th:replace="~{fragments/paginacion :: paginacion(${page}, '/web/productos', 'page', null)}"></div>

        <!-- Empty State -->
        <div th:if="${productos == null or productos.empty}" class="table-empty">
            <div class="empty-state">
                <div class="empty-state-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line>
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                </div>
                <h3 class="empty-state-title">No hay productos registrados</h3>
                <p class="empty-state-description">
                    Comienza agregando tu primer producto al sistema.
                </p>
                <a th:href="@{/web/productos/nuevo}" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Crear Primer Producto</span>
                </a>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="customJS">
    <script th:src="@{/js/productos-filtros.js}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        (function() {
            var successMessage = /*[[${successMessage}]]*/ null;
            var deleteMessage = /*[[${deleteMessage}]]*/ null;
            
            if (successMessage && typeof showToast === 'function') {
                showToast(successMessage, 'success');
            }
            
            if (deleteMessage && typeof showToast === 'function') {
                showToast(deleteMessage, 'error');
            }
        })();
        /*]]>*/
    </script>
</th:block>

</html>
