<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<th:block layout:fragment="content">

    <div class="table-toolbar">
        <div class="table-toolbar-left">
            <div class="table-search">
                <i class="fas fa-search table-search-icon"></i>
                <input type="text"
                       id="searchInput"
                       placeholder="Buscar por nombre o categoría..."
                       aria-label="Buscar productos">
            </div>
        </div>
        <div class="table-toolbar-right">
            <a th:href="@{/web/productos/nuevo}" class="btn btn-primary">
                <i class="fas fa-plus"></i>
                <span>Nuevo Producto</span>
            </a>
        </div>
    </div>

    <div class="table-wrapper">
        <table class="table table-striped table-mobile">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Marca</th>
                    <th style="text-align: right;">Precio Venta</th>
                    <th style="text-align: center;">Stock</th>
                    <th style="text-align: right;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="prod : ${productos}" class="data-row">
                    <td th:text="${prod.producto_id}" data-label="ID">...</td>
                    <td th:text="${prod.nombre}" data-label="Nombre">...</td>
                    <td th:text="${prod.categoria}" data-label="Categoría">...</td>
                    <td th:text="${prod.marca}" data-label="Marca">...</td>
                    <td th:text="|S/ ${#numbers.formatDecimal(prod.precio_venta, 1, 2)}|"
                        data-label="Precio"
                        style="text-align: right;">
                        S/ 0.00
                    </td>
                    <td style="text-align: center;" data-label="Stock">
                        <span th:text="${prod.cantidad_disponible}"
                              th:classappend="${prod.cantidad_disponible <= prod.stock_minimo} ? 'badge badge-danger' : 'badge badge-success'">
                            ...
                        </span>
                    </td>
                    <td data-label="Acciones">
                        <div class="table-actions">
                            <a th:href="@{/web/productos/editar/{id}(id=${prod.producto_id})}"
                               class="table-action-btn btn-edit"
                               title="Editar">
                                <i class="fas fa-edit"></i>
                                <span>Editar</span>
                            </a>
                            <a th:href="@{/web/productos/eliminar/{id}(id=${prod.producto_id})}"
                               class="table-action-btn btn-delete"
                               data-confirm="¿Estás seguro de eliminar este producto? Esta acción no se puede deshacer."
                               title="Eliminar">
                                <i class="fas fa-trash"></i>
                                <span>Eliminar</span>
                            </a>
                        </div>
                    </td>
                </tr>
                
                </tbody>
        </table>

        <div th:if="${productos == null OR productos.isEmpty()}" class="table-empty">
            <div class="empty-state">
                <div class="empty-state-icon">
                    <i class="fas fa-box-open"></i>
                </div>
                <h3 class="empty-state-title">No hay productos registrados</h3>
                <p class="empty-state-description">
                    Comienza agregando tu primer producto al sistema.
                </p>
                <a th:href="@{/web/productos/nuevo}" class="btn btn-primary">
                    <i class="fas fa-plus"></i>
                    Crear Primer Producto
                </a>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="customJS">
    <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        
        const searchInput = document.getElementById('searchInput');
        
        // Seleccionamos TODAS las filas que marcamos como "data-row"
        const dataRows = document.querySelectorAll('.table tbody tr.data-row');

        // Verificamos que los elementos existan
        if (searchInput && dataRows.length > 0) {
            
            function filterTable() {
                // Obtenemos el texto de búsqueda
                const searchTerm = searchInput.value.toLowerCase().trim();

                // Iteramos sobre CADA fila de datos
                dataRows.forEach(row => {
                    // Obtenemos el texto de las columnas 1 (Nombre) y 2 (Categoría)
                    const nombre = row.children[1]?.textContent.toLowerCase() || '';
                    const categoria = row.children[2]?.textContent.toLowerCase() || '';
                    
                    // Comprobamos si el texto coincide
                    const matchesSearch = nombre.includes(searchTerm) || categoria.includes(searchTerm);
                    
                    // Ocultamos o mostramos la fila
                    if (matchesSearch) {
                        row.style.display = ''; // Mostrar
                    } else {
                        row.style.display = 'none'; // Ocultar
                    }
                });
            }

            // Asignamos la función al evento 'input' (cada vez que tecleas)
            searchInput.addEventListener('input', filterTable);
        }
    });
    </script>
</th:block>
</html>
