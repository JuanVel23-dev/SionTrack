<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<th:block layout:fragment="content">
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">
                <span th:if="${clienteId == null}">Nuevo Cliente</span>
                <span th:if="${clienteId != null}">Editar Cliente</span>
            </h2>
        </div>
        
        <form th:object="${cliente}" 
              th:action="@{/web/clientes/guardar}" 
              method="post"
              data-validate>
            
            <input type="hidden" name="clienteId" th:value="${clienteId}" />
            
            <div class="card-body">
                <!-- Información Básica -->
                <h3 style="color: var(--accent-primary); margin-bottom: var(--spacing-lg); border-bottom: 1px solid var(--border-color); padding-bottom: var(--spacing-sm);">
                    <i class="fas fa-user"></i> Información Básica
                </h3>
                
                <div class="form-group">
                    <label for="nombre" class="form-label required">Nombre Completo</label>
                    <input type="text" 
                           id="nombre" 
                           th:field="*{nombre}" 
                           class="form-input"
                           required 
                           placeholder="Ej: Juan Pérez Sánchez"
                           aria-label="Nombre del cliente">
                    <span class="form-help">Ingresa el nombre completo del cliente</span>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: var(--spacing-lg);">
                    <div class="form-group">
                        <label for="cedula_ruc" class="form-label required">Cédula / RUC</label>
                        <input type="text" 
                               id="cedula_ruc" 
                               th:field="*{cedula_ruc}" 
                               class="form-input"
                               required 
                               placeholder="1234567890"
                               aria-label="Cédula o RUC">
                    </div>

                    <div class="form-group">
                        <label for="tipo_cliente" class="form-label required">Tipo de Cliente</label>
                        <select id="tipo_cliente" 
                                th:field="*{tipo_cliente}" 
                                class="form-select"
                                required>
                            <option value="">Seleccione un tipo</option>
                            <option value="Persona Natural">Persona Natural</option>
                            <option value="Empresa">Empresa</option>
                        </select>
                    </div>
                </div>

                <!-- Teléfonos -->
                <div class="divider"></div>
                <h3 style="color: var(--accent-primary); margin-bottom: var(--spacing-lg);">
                    <i class="fas fa-phone"></i> Teléfonos
                </h3>

                <div class="form-group">
                    <label class="form-label">Números de Teléfono</label>
                    <div id="telefonos-container" 
                         data-dynamic-field
                         data-add-button="add-telefono-btn"
                         data-field-name="telefonos"
                         data-field-type="tel"
                         data-placeholder="Ej: 0999999999"
                         th:attr="data-initial-index=${cliente.telefonos != null ? cliente.telefonos.size() : 0}">
                        
                        <div th:each="tel, iterStat : *{telefonos}" class="dynamic-field">
                            <input type="tel"
                                   th:field="*{telefonos[__${iterStat.index}__].telefono}"
                                   class="form-input"
                                   placeholder="Ej: 0999999999" />
                            <button type="button" class="btn btn-danger btn-sm btn-remove">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-ghost btn-sm" id="add-telefono-btn">
                        <i class="fas fa-plus"></i>
                        Añadir Teléfono
                    </button>
                </div>

                <!-- Direcciones -->
                <div class="divider"></div>
                <h3 style="color: var(--accent-primary); margin-bottom: var(--spacing-lg);">
                    <i class="fas fa-map-marker-alt"></i> Direcciones
                </h3>

                <div class="form-group">
                    <label class="form-label">Direcciones</label>
                    <div id="direcciones-container"
                         data-dynamic-field
                         data-add-button="add-direccion-btn"
                         data-field-name="direcciones"
                         data-field-type="text"
                         data-placeholder="Ej: Av. Principal 123 y Secundaria"
                         th:attr="data-initial-index=${cliente.direcciones != null ? cliente.direcciones.size() : 0}">
                        
                        <div th:each="dir, iterStat : *{direcciones}" class="dynamic-field">
                            <input type="text"
                                   th:field="*{direcciones[__${iterStat.index}__].direccion}"
                                   class="form-input"
                                   placeholder="Ej: Av. Principal 123 y Secundaria" />
                            <button type="button" class="btn btn-danger btn-sm btn-remove">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-ghost btn-sm" id="add-direccion-btn">
                        <i class="fas fa-plus"></i>
                        Añadir Dirección
                    </button>
                </div>

                <!-- Correos -->
                <div class="divider"></div>
                <h3 style="color: var(--accent-primary); margin-bottom: var(--spacing-lg);">
                    <i class="fas fa-envelope"></i> Correos Electrónicos
                </h3>

                <div class="form-group">
                    <label class="form-label">Correos</label>
                    <div id="correos-container"
                         data-dynamic-field
                         data-add-button="add-correo-btn"
                         data-field-name="correos"
                         data-field-type="email"
                         data-placeholder="Ej: cliente@ejemplo.com"
                         th:attr="data-initial-index=${cliente.correos != null ? cliente.correos.size() : 0}">
                        
                        <div th:each="correo, iterStat : *{correos}" class="dynamic-field">
                            <input type="email"
                                   th:field="*{correos[__${iterStat.index}__].correo}"
                                   class="form-input"
                                   placeholder="Ej: cliente@ejemplo.com" />
                            <button type="button" class="btn btn-danger btn-sm btn-remove">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-ghost btn-sm" id="add-correo-btn">
                        <i class="fas fa-plus"></i>
                        Añadir Correo
                    </button>
                </div>
            </div>

            <!-- Footer del formulario -->
            <div class="card-footer">
                <a th:href="@{/web/clientes}" class="btn btn-secondary">
                    <i class="fas fa-times"></i>
                    Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i>
                    <span th:if="${clienteId == null}">Crear Cliente</span>
                    <span th:if="${clienteId != null}">Guardar Cambios</span>
                </button>
            </div>
        </form>
    </div>
</th:block>

</html>
