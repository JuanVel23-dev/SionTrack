<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<th:block layout:fragment="content">
    <div class="table-toolbar">
        <div class="table-toolbar-left">
            <div class="table-search">
                <i class="fas fa-search table-search-icon"></i>
                <input type="text"
                       id="searchInput"
                       placeholder="Buscar clientes..."
                       aria-label="Buscar clientes">
            </div>

            <select class="table-filter" id="filterTipo">
                <option value="">Todos los tipos</option>
                <option value="Persona Natural">Persona Natural</option>
                <option value="Empresa">Empresa</option>
            </select>
        </div>

        <div class="table-toolbar-right">
            <a th:href="@{/web/clientes/nuevo}" class="btn btn-primary">
                <i class="fas fa-plus"></i>
                Nuevo Cliente
            </a>
        </div>
    </div>

    <div class="table-wrapper">
        <table class="table table-striped table-mobile">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Cédula / RUC</th>
                    <th>Tipo</th>
                    <th>Contacto</th>
                    <th style="text-align: right;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cliente : ${clientes}" th:data-tipo="${cliente.tipo_cliente}" class="data-row">
                    <td th:text="${cliente.cliente_id}" data-label="ID">1</td>
                    <td th:text="${cliente.nombre}" data-label="Nombre">Juan Pérez</td>
                    <td th:text="${cliente.cedula_ruc}" data-label="Cédula/RUC">1234567890</td>
                    <td data-label="Tipo">
                        <span class="badge badge-info" th:text="${cliente.tipo_cliente}">
                            Persona Natural
                        </span>
                    </td>
                    <td data-label="Contacto">
                        <div th:if="${!cliente.telefonos.isEmpty()}" class="contact-info-item">
                            <i class="fas fa-phone"></i>
                            <span th:text="${cliente.telefonos[0].telefono}">0999999999</span>
                        </div>
                        <div th:if="${!cliente.correos.isEmpty()}" class="contact-info-item-small">
                            <i class="fas fa-envelope"></i>
                            <span th:text="${cliente.correos[0].correo}">email@ejemplo.com</span>
                        </div>
                    </td>
                    <td data-label="Acciones">
                        <div class="table-actions">
                            <a th:href="@{/web/clientes/editar/{id}(id=${cliente.cliente_id})}"
                               class="table-action-btn btn-edit"
                               title="Editar">
                                <i class="fas fa-edit"></i>
                                <span>Editar</span>
                            </a>
                            
                            <a th:href="@{/web/clientes/{id}/vehiculos/nuevo(id=${cliente.cliente_id})}"
                               class="table-action-btn btn-view"
                               title="Agregar Vehículo">
                                <i class="fas fa-car-side"></i>
                                <span>Agregar</span> </a>

                            <a th:href="@{/web/clientes/eliminar/{id}(id=${cliente.cliente_id})}"
                               class="table-action-btn btn-delete"
                               data-confirm="¿Estás seguro de eliminar este cliente? Esta acción no se puede deshacer."
                               title="Eliminar">
                                <i class="fas fa-trash"></i>
                                <span>Eliminar</span>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${clientes == null OR clientes.isEmpty()}" class="table-empty">
            <div class="empty-state">
                <div class="empty-state-icon">
                    <i class="fas fa-users"></i>
                </div>
                <h3 class="empty-state-title">No hay clientes registrados</h3>
                <p class="empty-state-description">
                    Comienza agregando tu primer cliente al sistema
                </p>
                <a th:href="@{/web/clientes/nuevo}" class="btn btn-primary">
                    <i class="fas fa-plus"></i>
                    Crear Primer Cliente
                </a>
            </div>
        </div>
    </div>
    
</th:block>

<th:block layout:fragment="customJS">
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', () => {
            
            const searchInput = document.getElementById('searchInput');
            const filterTipo = document.getElementById('filterTipo');
            const dataRows = document.querySelectorAll('.table tbody tr.data-row');

            function filterTable() {
                const searchTerm = searchInput.value.toLowerCase().trim();
                const tipoFilter = filterTipo.value;

                dataRows.forEach(row => {
                    const nombre = row.children[1]?.textContent.toLowerCase() || '';
                    const cedula = row.children[2]?.textContent.toLowerCase() || '';
                    const tipo = row.dataset.tipo || '';

                    const matchesSearch = nombre.includes(searchTerm) || 
                                          cedula.includes(searchTerm);
                    const matchesTipo = !tipoFilter || tipo === tipoFilter;

                    if (matchesSearch && matchesTipo) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            }
            
            if (searchInput) {
                searchInput.addEventListener('input', filterTable);
            }
            if (filterTipo) {
                filterTipo.addEventListener('change', filterTable);
            }
        });
    </script>
</th:block>

</html>
