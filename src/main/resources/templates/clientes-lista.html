<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Clientes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn {
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 4px;
            margin: 2px;
            display: inline-block;
        }
        .btn-crear { background-color: #007bff; color: white; margin-bottom: 15px; }
        .btn-editar { background-color: #ffc107; color: black; }
        .btn-eliminar { background-color: #dc3545; color: white; }
    </style>
</head>
<body>

    <h1>Gestión de Clientes</h1>

    <a th:href="@{/web/clientes/nuevo}" class="btn btn-crear">
        Crear Nuevo Cliente
    </a>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Cédula / RUC</th>
                <th>Tipo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.cliente_id}">...</td>
                <td th:text="${cliente.nombre}">...</td>
                <td th:text="${cliente.cedula_ruc}">...</td>
                <td th:text="${cliente.tipo_cliente}">...</td>
                <td>
                    <a th:href="@{/web/clientes/editar/{id}(id=${cliente.cliente_id})}" 
                       class="btn btn-editar">Actualizar</a>
                    
                    <a th:href="@{/web/clientes/eliminar/{id}(id=${cliente.cliente_id})}" 
                       class="btn btn-eliminar"
                       onclick="return confirm('¿Estás seguro de que deseas eliminar este cliente?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
