<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SionTrack - Iniciar Sesion</title>
    <link rel="icon" type="image/png" href="/img/LogoSion.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" th:href="@{/css/nucleo.css}">
    <link rel="stylesheet" th:href="@{/css/componentes.css}">
    <link rel="stylesheet" th:href="@{/css/paginas.css}">
</head>
<body class="login-page">

    <!-- Canvas de particulas (red tecnologica) -->
    <canvas id="loginCanvas" class="login-canvas"></canvas>

    <!-- Fondo con capas -->
    <div class="login-bg">
        <div class="login-bg-gradient"></div>
        <div class="login-bg-grid"></div>
        <div class="login-bg-vignette"></div>
    </div>

    <div class="login-container">
        <!-- Card de Login -->
        <div class="login-card" id="loginCard">
            <!-- Linea de escaneo decorativa -->
            <div class="login-scanline"></div>

            <!-- Borde con glow -->
            <div class="login-card-glow"></div>

            <!-- Header con logo y anillos orbitales -->
            <div class="login-header" data-stagger="1">
                <div class="login-logo">
                    <div class="logo-orbit logo-orbit-1"></div>
                    <div class="logo-orbit logo-orbit-2"></div>
                    <div class="logo-orbit logo-orbit-3"></div>
                    <div class="logo-core">
                        <img th:src="@{/img/sion_logo.svg}" alt="SionTrack" class="logo-img">
                    </div>
                    <div class="logo-pulse"></div>
                </div>
                <h1 class="login-title" data-stagger="2">Bienvenido</h1>
                <p class="login-subtitle" data-stagger="3">Ingresa a tu cuenta de SionTrack</p>
            </div>

            <!-- Alertas -->
            <div th:if="${param.error}" class="login-alert login-alert-error">
                <div class="login-alert-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="15" y1="9" x2="9" y2="15"></line>
                        <line x1="9" y1="9" x2="15" y2="15"></line>
                    </svg>
                </div>
                <span>Usuario o contrasena incorrectos</span>
            </div>

            <div th:if="${param.logout}" class="login-alert login-alert-success">
                <div class="login-alert-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <span>Sesion cerrada exitosamente</span>
            </div>

            <div th:if="${param.expired}" class="login-alert login-alert-error">
                <div class="login-alert-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </div>
                <span>Tu sesion ha expirado</span>
            </div>

            <!-- Formulario -->
            <form th:action="@{/login}" method="post" class="login-form" id="loginForm">
                <!-- Campo Usuario -->
                <div class="input-group" data-stagger="5">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text"
                               id="username"
                               name="username"
                               class="input-field"
                               placeholder=" "
                               required
                               autocomplete="username"
                               autofocus>
                        <label for="username" class="input-label">Usuario</label>
                        <div class="input-focus-line"></div>
                    </div>
                </div>

                <!-- Campo Contrasena -->
                <div class="input-group" data-stagger="6">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password"
                               id="password"
                               name="password"
                               class="input-field"
                               placeholder=" "
                               required
                               autocomplete="current-password">
                        <label for="password" class="input-label">Contrasena</label>
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contrasena">
                            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                        <div class="input-focus-line"></div>
                    </div>
                </div>

                <!-- Boton de Login -->
                <div data-stagger="7">
                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="login-btn-bg"></span>
                        <span class="login-btn-content">
                            <span class="btn-text">Ingresar</span>
                            <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </span>
                        <span class="login-btn-loader"></span>
                    </button>
                </div>
            </form>

            <!-- Footer -->
            <div class="login-footer" data-stagger="8">
                <div class="login-footer-line"></div>
                <p>Sistema de Gestion Empresarial</p>
            </div>
        </div>

        <!-- Version -->
        <div class="login-version" data-stagger="9">
            <span class="login-version-dot"></span>
            SionTrack
        </div>
    </div>

    <script th:src="@{/js/login.js}"></script>
</body>
</html>
