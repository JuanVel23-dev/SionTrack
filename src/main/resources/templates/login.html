<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SionTrack - Iniciar Sesión</title>
    
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #e9ecef; }
        .login-container { background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #343a40; margin-bottom: 25px; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #495057; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; text-align: center; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Iniciar Sesión en SionTrack</h2>

        <div th:if="${param.error}" class="alert alert-error">
            ⚠️ Usuario o contraseña inválidos.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            ✅ Has cerrado sesión exitosamente.
        </div>

        <form th:action="@{/login}" method="post">
            
            <div>
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required autofocus />
            </div>
            
            <div>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required />
            </div>
            
            <div>
                <button type="submit">Ingresar</button>
            </div>
            
            </form>
    </div>

</body>
</html>
