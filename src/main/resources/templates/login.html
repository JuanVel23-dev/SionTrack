<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SionTrack - Iniciar Sesión</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" th:href="@{/css/nucleo.css}">
    <link rel="stylesheet" th:href="@{/css/componentes.css}">
    <link rel="stylesheet" th:href="@{/css/paginas.css}">
</head>
<body class="login-page">
    <!-- Fondo animado -->
    <div class="login-bg">
        <div class="login-bg-gradient"></div>
        <div class="login-bg-grid"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <div class="login-container">
        <!-- Card de Login -->
        <div class="login-card">
            <!-- Header con logo animado -->
            <div class="login-header">
                <div class="login-logo">
                    <span class="logo-letter">S</span>
                    <div class="logo-pulse"></div>
                </div>
                <h1 class="login-title">Bienvenido</h1>
                <p class="login-subtitle">Ingresa a tu cuenta de SionTrack</p>
            </div>

            <!-- Alertas -->
            <div th:if="${param.error}" class="alert alert-error animate-shake">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
                <span>Usuario o contraseña incorrectos</span>
            </div>

            <div th:if="${param.logout}" class="alert alert-success animate-slide-in">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>Sesión cerrada exitosamente</span>
            </div>

            <!-- Formulario -->
            <form th:action="@{/login}" method="post" class="login-form">
                <!-- Campo Usuario -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" 
                               id="username" 
                               name="username" 
                               class="input-field" 
                               placeholder=" "
                               required 
                               autocomplete="username"
                               autofocus>
                        <label for="username" class="input-label">Usuario</label>
                        <div class="input-border"></div>
                    </div>
                </div>

                <!-- Campo Contraseña -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" 
                               id="password" 
                               name="password" 
                               class="input-field" 
                               placeholder=" "
                               required
                               autocomplete="current-password">
                        <label for="password" class="input-label">Contraseña</label>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                        <div class="input-border"></div>
                    </div>
                </div>

                <!-- Botón de Login -->
                <button type="submit" class="login-btn">
                    <span class="btn-text">Ingresar</span>
                    <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                    <div class="btn-loader"></div>
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>Sistema de Gestión Empresarial</p>
            </div>
        </div>

        <!-- Versión -->
        <div class="login-version">SionTrack v2.0</div>
    </div>

    <script th:src="@{/js/login.js}"></script>
</body>
</html>
